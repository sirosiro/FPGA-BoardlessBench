<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f0f3f6" stroke-width="1"/>
    </pattern>
    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="240" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect width="800" height="240" rx="8" fill="url(#grid)" />

  <!-- Labels -->
  <text x="30" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="bold" fill="#475569">生信号 (Raw State)</text>
  <text x="30" y="145" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="bold" fill="#475569">確定信号 (Stable State)</text>

  <!-- Polling Grids & Labels -->
  <line x1="200" y1="30" x2="200" y2="185" stroke="#94a3b8" stroke-dasharray="3,3" stroke-width="1"/>
  <text x="200" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">変化検知 (t0)</text>

  <line x1="240" y1="30" x2="240" y2="185" stroke="#cbd5e1" stroke-dasharray="3,3" stroke-width="1"/>
  <text x="240" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">5ms (1回目)</text>

  <line x1="280" y1="30" x2="280" y2="185" stroke="#cbd5e1" stroke-dasharray="3,3" stroke-width="1"/>
  <text x="280" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">10ms (2回目)</text>

  <line x1="320" y1="30" x2="320" y2="185" stroke="#cbd5e1" stroke-dasharray="3,3" stroke-width="1"/>
  <text x="320" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">15ms (3回目)</text>

  <line x1="360" y1="30" x2="360" y2="185" stroke="#0ea5e9" stroke-dasharray="3,3" stroke-width="1.5"/>
  <text x="360" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" fill="#0ea5e9" text-anchor="middle">20ms 安定 (4回目)</text>
  <text x="360" y="225" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="bold" fill="#0ea5e9" text-anchor="middle">(コールバック実行)</text>

  <!-- Arrow indicating debounce window -->
  <path d="M 206 180 L 354 180" fill="none" stroke="#64748b" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="280" y="174" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="bold" fill="#64748b" text-anchor="middle">デバウンス窓 (20ms)</text>

  <!-- Raw State Waveform (Orange) -->
  <!-- 0-200: Low (y=80), 200: Rise, 205: Fall, 210: Rise, 215: Fall, 220: Rise, 225: Fall, 230: Rise (Stable) -->
  <path d="M 50 80 L 200 80 L 200 40 L 205 40 L 205 80 L 210 80 L 210 40 L 215 40 L 215 80 L 220 80 L 220 40 L 225 40 L 225 80 L 230 80 L 230 40 L 750 40" 
        fill="none" stroke="#f97316" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Stable State Waveform (Green) -->
  <!-- 0-360: Low (y=160), 360: Rise to 120, 360-750: High (y=120) -->
  <path d="M 50 160 L 360 160 L 360 120 L 750 120" 
        fill="none" stroke="#10b981" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
